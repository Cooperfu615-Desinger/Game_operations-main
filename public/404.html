<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Game Operations</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the full path as a query param and redirects to index.html
      var pathSegmentsToKeep = 1 // number of path segments in the repo name (e.g. /Game_operations-main/)
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
